<app-header></app-header>

<div class="feedback-page">
  <div class="feedback-card">
    <h2>Share Your Feedback</h2>
    <p class="muted">We appreciate your comments. Please tell us how we can improve the Healthcare Management System.</p>

    <form #feedbackForm="ngForm" (ngSubmit)="submitFeedback(feedbackForm)">
      <div class="row">
        <div class="col-sm-6 form-group">
          <label for="name">Name</label>
          <input id="name" name="name" required class="form-control" [(ngModel)]="feedback.name" placeholder="John Doe" />
        </div>
        <div class="col-sm-6 form-group">
          <label for="email">Email</label>
          <input id="email" name="email" required type="email" class="form-control" [(ngModel)]="feedback.email" placeholder="johndoe@example.com" />
        </div>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input id="subject" name="subject" required class="form-control" [(ngModel)]="feedback.subject" placeholder="Feedback subject" />
      </div>

      <div class="form-group rating-block">
        <label>Rating</label>
        <div class="stars">
          <i *ngFor="let r of [1,2,3,4,5]; let i = index" class="fa" [ngClass]="{'fa-star': feedback.rating >= (5 - i), 'fa-star-o': feedback.rating < (5 - i) }" (click)="setRating(5 - i)" title="{{5 - i}} star"></i>
        </div>
        <div class="rating-label">{{ feedback.rating }} / 5</div>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required rows="5" class="form-control" [(ngModel)]="feedback.message" (input)="updateCharCount()" placeholder="Tell us what you liked or what we can improve."></textarea>
        <div class="char-count">{{ charCount }} / {{ maxChars }} characters</div>
      </div>

      <div class="feedback-actions">
        <button type="submit" class="btn submit-btn">Submit Feedback</button>
      </div>
    </form>

    <div *ngIf="successMessage" class="alert alert-success mt-3">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger mt-3">
      {{ errorMessage }}
    </div>
  </div>
</div>

<app-footer></app-footer>
